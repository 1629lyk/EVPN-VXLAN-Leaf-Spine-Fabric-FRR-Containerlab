name: underlay

topology:
  defaults:
    kind: linux
    image: frrouting/frr:latest
    cap-add:
      - NET_ADMIN
      - SYS_ADMIN
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.rp_filter: 0
      net.ipv4.conf.default.rp_filter: 0

  nodes:
    sp1:
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/vtysh.conf:/etc/frr/vtysh.conf
        - configs/sp1/frr.conf:/etc/frr/frr.conf
    sp2:
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/vtysh.conf:/etc/frr/vtysh.conf
        - configs/sp2/frr.conf:/etc/frr/frr.conf
    leaf1:
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/vtysh.conf:/etc/frr/vtysh.conf
        - configs/leaf1/frr.conf:/etc/frr/frr.conf
    leaf2:
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/vtysh.conf:/etc/frr/vtysh.conf
        - configs/leaf2/frr.conf:/etc/frr/frr.conf

  links:
    - endpoints: ["sp1:eth1", "leaf1:eth1"]
    - endpoints: ["sp2:eth1", "leaf1:eth2"]
    - endpoints: ["sp1:eth2", "leaf2:eth1"]
    - endpoints: ["sp2:eth2", "leaf2:eth2"]
